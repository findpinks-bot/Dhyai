    <style>
        /* MOBILE STRICT GRID SETTINGS */
        :root {
            --grid-line: 8vw; /* The unshakeable left anchor */
            --chapter-pause: 20vh; /* Massive vertical margins */
        }

        body {
            background-color: #fffbef;
            margin: 0;
            padding: 0;
            font-family: 'Tenor Sans', sans-serif;
            color: #5c3a05;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .bg-texture {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('Hero-Image.png');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: -1;
        }

        .logo {
            position: absolute;
            top: 40px;
            left: var(--grid-line); /* Anchored strictly to the grid */
            width: 120px;
            mix-blend-mode: multiply;
            z-index: 100;
        }

        /* TYPOGRAPHY */
        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px; 
            color: #322203;
            margin: 0 0 32px 0;
            line-height: 1.2;
            font-weight: 600;
        }

        /* Hero: Lowered, heavy, anchored */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            padding-bottom: 20vh; 
            padding-left: var(--grid-line);
            padding-right: var(--grid-line);
            box-sizing: border-box;
        }

        .hero h2 {
            font-size: 26px; 
            line-height: 1.5;
            margin: 0;
            letter-spacing: 0.02em;
        }

        p, a {
            font-size: 16px; 
            line-height: 1.8;
            margin: 0 0 24px 0;
            text-decoration: none;
            color: inherit;
            display: block;
            letter-spacing: 0.02em;
        }

        /* Forces the two process lines tightly together */
        .tight-lines {
            line-height: 1.2;
        }

        .end-statement {
            color: #9e6821;
            display: block;
            margin-top: 48px;
            font-size: 16px; 
            letter-spacing: 0.02em;
        }

        /* LAYOUT ARCHITECTURE */
        .content-container {
            padding: 0 var(--grid-line); /* Enforces the invisible left edge */
            width: 100%;
            box-sizing: border-box;
        }

        .chapter {
            margin-bottom: var(--chapter-pause); 
        }

        /* THE MOMENT OF BOLDNESS: Full Bleed Images */
        .full-bleed {
            width: 100vw;
            height: auto;
            position: relative;
            left: calc(-1 * var(--grid-line)); /* Violently breaks the grid to touch the glass */
            margin-top: 10vh;
            display: block;
        }

        /* STRICT GALLERY: Adheres strictly to the grid */
        .gallery-wrap {
            display: flex;
            flex-direction: column;
            gap: 40px; 
            margin-top: 40px; 
        }

        .gallery-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }
