    <style>
        /* DESKTOP STRICT GRID SETTINGS */
        :root {
            --grid-line: 15vw; 
            --chapter-pause: 25vh; 
        }

        body {
            background-color: #fffbef;
            margin: 0;
            padding: 0;
            font-family: 'Tenor Sans', sans-serif;
            color: #5c3a05;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .bg-texture {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('Hero-Image.png');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: -1;
        }

        /* STRICT TEXT HIERARCHY LOCK */
        .text-block {
            display: flex;
            flex-direction: column;
            gap: 32px; 
            max-width: 700px; 
        }

        .text-block h2, 
        .text-block p, 
        .text-block a, 
        .text-block span {
            margin: 0 !important; 
        }

        /* TYPOGRAPHY */
        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 56px; 
            color: #322203;
            line-height: 1.15;
            font-weight: 600;
        }

        /* HERO SECTION */
        .hero {
            position: relative; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            padding-bottom: 25vh; 
            padding-left: var(--grid-line);
            padding-right: var(--grid-line);
            box-sizing: border-box;
        }

        /* BULLETPROOF LOGO (Corner oriented, 28% larger) */
        .logo {
            position: absolute; 
            top: 60px;
            left: 5vw; /* Left corner oriented */
            width: 180px; /* Scaled up from 140px */
            mix-blend-mode: multiply;
            z-index: 10;
        }

        .hero h2 {
            font-size: clamp(40px, 5vw, 62px); 
            line-height: 1.3;
            margin: 0;
            letter-spacing: 0.02em;
        }

            font-size: 24px; 
            line-height: 1.8;
            text-decoration: none;
            color: inherit;
            display: block;
            letter-spacing: 0.02em;
            word-spacing: 0.08em;
